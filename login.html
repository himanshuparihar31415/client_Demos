<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Demos &amp; Pilots</title>
<style>
  :root{
    --bg: #f7f8f7;
    --panel: #ffffff;
    --ink: #1c2622;
    --ink-dim: #6b7772;
    --amber: #c07a1e;
    --rust: #b04a2f;
    --rust-soft: #f6e3dd;
    --line: #e2e6e4;
    --line-strong: #cdd4d1;
    --shadow: 0 1px 2px rgba(28,38,34,0.06), 0 12px 34px rgba(28,38,34,0.08);
    --mono: "Courier New", Courier, monospace;
    --display: Georgia, "Times New Roman", serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .card{
    background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--amber);
    border-radius:6px;box-shadow:var(--shadow);width:100%;max-width:380px;padding:30px 28px;
  }
  .brand{text-align:center;margin-bottom:22px;}
  .brand h1{font-family:var(--display);font-size:26px;margin:0;letter-spacing:0.5px;}
  .brand .sub{
    font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-dim);margin-top:6px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:5px;
  }
  .field input{
    width:100%;background:#fff;border:1px solid var(--line-strong);color:var(--ink);
    font-family:var(--mono);font-size:14px;padding:11px 12px;border-radius:2px;
  }
  .field input:focus{outline:2px solid var(--amber);outline-offset:-1px;border-color:var(--amber);}
  .btn{
    width:100%;background:var(--amber);color:#fff;border:none;font-family:var(--mono);
    font-weight:700;font-size:14px;letter-spacing:1px;padding:12px;cursor:pointer;
    border-radius:2px;text-transform:uppercase;margin-top:4px;
  }
  .btn:hover{background:#a9691a;}
  .error{
    display:none;background:var(--rust-soft);border:1px solid #e4b6a9;color:var(--rust);
    font-size:12px;padding:9px 12px;border-radius:2px;margin-bottom:14px;
  }
  .error.show{display:block;}
  .hint{
    margin-top:18px;font-size:11px;color:var(--ink-dim);text-align:center;line-height:1.6;
    border-top:1px dashed var(--line-strong);padding-top:14px;
  }
  .hint code{background:var(--bg);padding:1px 5px;border-radius:2px;border:1px solid var(--line);}
</style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="off">
    <div class="brand">
      <h1>Departures</h1>
      <div class="sub">Sign In</div>
    </div>

    <div class="error" id="errorBox">Invalid username or password.</div>

    <div class="field">
      <label>Username</label>
      <input id="username" type="text" placeholder="username" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="password">
    </div>
    <button class="btn" type="submit">Sign In</button>

    <div class="hint">
      Demo credentials:<br>
      <code>admin</code> / <code>demo1234</code>
    </div>
  </form>

<script>
  // NOTE: client-side demo auth only. Not real security — anyone can read this file.
  const USERS = {
    admin: 'demo1234',
    ujjwal: 'pilot2026',
  };
  const SESSION_KEY = 'auth:session';

  // Already signed in? Go straight to the board.
  if(sessionStorage.getItem(SESSION_KEY)){
    window.location.replace('demo_pilot_tracker.html');
  }

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value;
    const errBox = document.getElementById('errorBox');

    if(USERS[u] && USERS[u] === p){
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({user:u, at:Date.now()}));
      window.location.replace('demo_pilot_tracker.html');
    } else {
      errBox.classList.add('show');
      document.getElementById('password').value = '';
    }
  });
</script>
</body>
</html>
